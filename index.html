  .topic-block.open .expand-arrow { transform: rotate(180deg); }

  .topic-block.open .topic-detail { display: block; }
  .topic-block.done .topic-detail { border-top-color: #bbf7d0; }

  .notes-label { font-size: 11px; font-weight: bold; letter-spacing: .08em; text-transform: uppercase; color: #999; margin-bottom: 6px; }

function load(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function getState(id) {
  return load('state_' + id) || { done: false, note: '', code: '' };
}
function setState(id, patch) {
  const s = getState(id);
  save('state_' + id, { ...s, ...patch });
}

function getDsaState(id) {
  return load('dsa_' + id) || {};
}
function setDsaState(id, problems) {
  save('dsa_' + id, problems);
}

function countStats() {
  let total = 0, done = 0;
  DATA.forEach(ph => ph.topics.forEach(t => {
    total++;
    if (getState(t.id).done) done++;
  }));
  return { total, done };
}

function updateCounter() {
  const { total, done } = countStats();
  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = total;
  document.getElementById('prog').style.width = Math.round(done / total * 100) + '%';
}

function tagHtml(tags) {
  const map = { py:'tag-py', dsa:'tag-dsa', sql:'tag-sql', ai:'tag-ai', proj:'tag-proj' };
  const labels = { py:'Python', dsa:'DSA', sql:'SQL', ai:'AI/ML', proj:'Project' };
  return tags.map(t => `<span class="track-tag ${map[t]||''}">${labels[t]||t}</span>`).join('');
}

function renderTopic(t) {
  const s = getState(t.id);
  const doneClass = s.done ? ' done' : '';
  const checklistHtml = t.checklist.map(c => `<li>${c}</li>`).join('');
  return `
  <div class="topic-block${doneClass}" id="block_${t.id}">
    <div class="topic-row" onclick="toggleTopic('${t.id}')">
      <div class="tick-btn" onclick="event.stopPropagation(); toggleDone('${t.id}')">
        <span class="tick-icon">✓</span>
      </div>
      <div class="topic-info">
        <div class="topic-days">${t.days} ${tagHtml(t.tags)}</div>
        <div class="topic-name">${t.name}</div>
        <div class="topic-sub">${t.sub}</div>
      </div>
      <span class="expand-arrow">▼</span>
    </div>
    <div class="topic-detail">
      <div class="checklist">
        <div class="checklist-title">What to cover</div>
        <ul>${checklistHtml}</ul>
      </div>
      <div class="notes-area">
        <div class="notes-label">Notes — what's missing / what confused you</div>
        <textarea class="notes-box" id="note_${t.id}" placeholder="${t.note_ph || 'Add notes here…'}" oninput="autoSave('${t.id}')">${s.note}</textarea>
      </div>
      ${t.code_ph !== '' || s.code ? `
      <div class="code-area">
        <div class="code-label">Your code for this topic</div>
        <textarea class="code-box" id="code_${t.id}" placeholder="${t.code_ph || '# Write your code here…'}" oninput="autoSave('${t.id}')">${s.code}</textarea>

      <div class="save-row">
        <button class="save-btn" id="savebtn_${t.id}" onclick="saveNote('${t.id}')">save</button>
      </div>

  </div>`;
}

function renderDSA(t) {
  const dsaState = getDsaState(t.id);
  const problemsHtml = t.problems.map((p, i) => {
    const checked = dsaState[i] ? ' checked' : '';
    return `<li>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox"${checked} onchange="toggleDsaProblem('${t.id}',${i},this.checked)" style="accent-color:#16a34a;width:14px;height:14px;flex-shrink:0">
        <span style="font-size:13px;color:#333">${p}</span>
      </label>
    </li>`;
  }).join('');
  const done = t.problems.filter((_, i) => dsaState[i]).length;
  return `
  <div class="topic-block" id="dsa_block_${t.id}" style="margin-bottom:2px">
    <div class="topic-row" onclick="toggleDsaTopic('${t.id}')">
      <div class="topic-info">
        <div class="topic-days">${t.days} <span class="track-tag tag-dsa">DSA</span></div>
        <div class="topic-name">${t.name}</div>
        <div class="topic-sub" style="color:#16a34a;font-size:12px">${done} / ${t.problems.length} solved</div>
      </div>
      <span class="expand-arrow" id="dsa_arrow_${t.id}">▼</span>
    </div>
    <div class="topic-detail" id="dsa_detail_${t.id}">
      <div class="checklist">
        <div class="checklist-title">Problems</div>
        <ul style="list-style:none">${problemsHtml}</ul>
      </div>
    </div>
  </div>`;
}

function toggleTopic(id) {
  const block = document.getElementById('block_' + id);
  block.classList.toggle('open');
}

function toggleDsaTopic(id) {
  const detail = document.getElementById('dsa_detail_' + id);
  const arrow = document.getElementById('dsa_arrow_' + id);
  const open = detail.style.display === 'block';
  detail.style.display = open ? 'none' : 'block';
  arrow.style.transform = open ? '' : 'rotate(180deg)';
}

function toggleDone(id) {
  const s = getState(id);
  setState(id, { done: !s.done });
  const block = document.getElementById('block_' + id);
  block.classList.toggle('done', !s.done);
  updateCounter();
}

function toggleDsaProblem(topicId, idx, checked) {
  const s = getDsaState(topicId);
  s[idx] = checked;
  setDsaState(topicId, s);
  // update counter text
  const block = document.getElementById('dsa_block_' + topicId);
  const topic = DSA_TOPICS.find(t => t.id === topicId);
  const done = topic.problems.filter((_, i) => s[i]).length;
  block.querySelector('.topic-sub').textContent = done + ' / ' + topic.problems.length + ' solved';
}

let saveTimers = {};
function autoSave(id) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(() => saveNote(id, true), 1500);
}

function saveNote(id, silent) {
  const noteEl = document.getElementById('note_' + id);
  const codeEl = document.getElementById('code_' + id);
  setState(id, {
    note: noteEl ? noteEl.value : getState(id).note,
    code: codeEl ? codeEl.value : getState(id).code
  });
  if (!silent) {
    const btn = document.getElementById('savebtn_' + id);
    btn.textContent = 'saved ✓';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'save'; btn.classList.remove('saved'); }, 1500);
  }
}

function buildApp() {
  const app = document.getElementById('app');
  let html = '';

  DATA.forEach(phase => {
    html += `<div class="phase-block">
      <div class="phase-label">${phase.days}</div>
      <div class="phase-title">${phase.phase}</div>`;

    // If phase 1, interleave DSA blocks by day range
    if (phase.phase.includes('Foundation')) {
      phase.topics.forEach(t => { html += renderTopic(t); });
      html += `<div style="margin-top:32px"><div class="phase-label">DSA Track — 2 hrs/day</div><div class="phase-title" style="font-size:15px;border-width:1px">LeetCode Problems — 45+ in Phase 1</div>`;
      DSA_TOPICS.slice(0, 5).forEach(t => { html += renderDSA(t); });
      html += `</div>`;
    } else if (phase.phase.includes('Build')) {
      phase.topics.forEach(t => { html += renderTopic(t); });
      html += `<div style="margin-top:32px"><div class="phase-label">DSA Track — continued</div><div class="phase-title" style="font-size:15px;border-width:1px">LeetCode Problems — 90+ in Phase 2</div>`;
      DSA_TOPICS.slice(5).forEach(t => { html += renderDSA(t); });
      html += `</div>`;
    } else {
      phase.topics.forEach(t => { html += renderTopic(t); });
    }

    html += `</div>`;
  });

  app.innerHTML = html;
  updateCounter();
}

buildApp();
</script>
</body>
</html>
